name: Issue Management Automation

on:
  issues:
    types: [opened, labeled]

jobs:
  issue-triage:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm install @octokit/rest

      - name: Run triage script
        uses: actions/github-script@v7
        with:
          script: |
            const { Octokit } = require('@octokit/rest');
            const octokit = new Octokit({ auth: process.env.GITHUB_TOKEN });

            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const issueNumber = context.issue.number;
            const issue = context.payload.issue;

            // Define labels to create if missing
            const labels = [
              // Category labels
              { name: 'bug', color: 'd73a4a', description: 'Something isn\'t working' },
              { name: 'enhancement', color: 'a2eeef', description: 'New feature or request' },
              { name: 'epic', color: '0052cc', description: 'Large feature requiring multiple sub-tasks' },
              { name: 'maintenance', color: 'fef2c0', description: 'Maintenance and housekeeping tasks' },
              // Priority labels
              { name: 'priority-critical', color: 'b60205', description: 'Critical priority issue' },
              { name: 'priority-high', color: 'ff9f1c', description: 'High priority issue' },
              { name: 'priority-medium', color: 'ffd500', description: 'Medium priority issue' },
              { name: 'priority-low', color: 'e6e6e6', description: 'Low priority issue' },
              // Status labels
              { name: 'needs-triage', color: 'ffff00', description: 'Needs to be reviewed by maintainers' },
              { name: 'needs-review', color: '006b75', description: 'Awaiting review from maintainers' },
              { name: 'first-time-contributor', color: '008672', description: 'Issue created by first-time contributor' }
            ];

            // Create missing labels
            for (const label of labels) {
              try {
                await octokit.rest.issues.getLabel({ owner, repo, name: label.name });
              } catch (error) {
                if (error.status === 404) {
                  await octokit.rest.issues.createLabel({ owner, repo, ...label });
                } else {
                  throw error;
                }
              }
            }

            // Add initial needs-triage label
            await octokit.rest.issues.addLabels({
              owner,
              repo,
              issue_number: issueNumber,
              labels: ['needs-triage']
            });

            // Process category labels based on title
            const title = issue.title.toLowerCase();
            const categoryLabels = [];

            if (title.includes('bug')) {
              categoryLabels.push('bug');
            }
            if (title.includes('epic')) {
              categoryLabels.push('epic');
            }
            if (title.includes('maintenance')) {
              categoryLabels.push('maintenance');
            }

            if (categoryLabels.length > 0) {
              await octokit.rest.issues.addLabels({
                owner,
                repo,
                issue_number: issueNumber,
                labels: categoryLabels
              });
            }

            // Process priority labels based on title and body
            const content = (issue.title + ' ' + issue.body).toLowerCase();
            let priorityLabel = 'priority-medium'; // Default

            // Check for critical keywords first
            if (['critical', 'urgent', 'production', 'outage'].some(word => content.includes(word))) {
              priorityLabel = 'priority-critical';
            }
            // Then high
            else if (['important', 'high', 'blocking'].some(word => content.includes(word))) {
              priorityLabel = 'priority-high';
            }
            // Then low
            else if (['low', 'nice-to-have', 'minor'].some(word => content.includes(word))) {
              priorityLabel = 'priority-low';
            }

            // Add priority label
            await octokit.rest.issues.addLabels({
              owner,
              repo,
              issue_number: issueNumber,
              labels: [priorityLabel]
            });

  task-breakdown:
    runs-on: ubuntu-latest
    needs: [issue-triage]
    if: contains(github.event.issue.labels.*.name, 'epic')
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm install @octokit/rest

      - name: Create sub-tasks for epic
        uses: actions/github-script@v7
        with:
          script: |
            const { Octokit } = require('@octokit/rest');
            const octokit = new Octokit({ auth: process.env.GITHUB_TOKEN });

            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const parentIssueNumber = context.issue.number;
            const parentIssue = context.payload.issue;
            const parentTitle = parentIssue.title;

            // Define sub-tasks
            const subTasks = [
              { name: 'Requirements Analysis' },
              { name: 'Design and Architecture' },
              { name: 'Implementation' },
              { name: 'Testing and Documentation' }
            ];

            const subIssueNumbers = [];

            // Create each sub-task
            for (let i = 0; i < subTasks.length; i++) {
              const taskNumber = i + 1;
              const subTitle = `[SUBTASK] ${parentTitle} - Task ${taskNumber}: ${subTasks[i].name}`;
              const subBody = `Related to #${parentIssueNumber}`;

              const { data: subIssue } = await octokit.rest.issues.create({
                owner,
                repo,
                title: subTitle,
                body: subBody,
                labels: ['enhancement', 'needs-review']
              });

              subIssueNumbers.push(subIssue.number);
            }

            // Update parent issue body with checklist
            const checklist = subIssueNumbers.map(num => `- [ ] #${num}`).join('\n');
            const newBody = (parentIssue.body || '') + `\n\n## Epic Tasks\n${checklist}`;

            await octokit.rest.issues.update({
              owner,
              repo,
              issue_number: parentIssueNumber,
              body: newBody
            });

  auto-response:
    runs-on: ubuntu-latest
    needs: [issue-triage]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm install @octokit/rest

      - name: Run auto-response script
        uses: actions/github-script@v7
        with:
          script: |
            const { Octokit } = require('@octokit/rest');
            const octokit = new Octokit({ auth: process.env.GITHUB_TOKEN });

            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const issueNumber = context.issue.number;
            const issue = context.payload.issue;
            const author = issue.user.login;

            // Check if author has any other issues in this repo
            const { data: authorIssues } = await octokit.rest.issues.listForRepo({
              owner,
              repo,
              creator: author,
              state: 'all'
            });

            const isFirstIssue = authorIssues.length === 1;

            // Add first-time-contributor label if needed
            if (isFirstIssue) {
              await octokit.rest.issues.addLabels({
                owner,
                repo,
                issue_number: issueNumber,
                labels: ['first-time-contributor']
              });
            }

            // Determine comment content based on labels
            const issueLabels = issue.labels.map(l => l.name.toLowerCase());
            let commentBody = '';

            if (issueLabels.includes('bug')) {
              commentBody = 'Thank you for reporting this bug! Please review our [Bug Report Guidelines](.github/ISSUE_TEMPLATE/bug_report.md) to ensure all necessary information is provided.';
            } else if (issueLabels.includes('epic')) {
              commentBody = 'Thank you for submitting this epic feature request! Please review our [Feature Request Process](.github/ISSUE_TEMPLATE/feature_request.md) for more details on how we handle large features.';
            } else if (issueLabels.includes('maintenance')) {
              commentBody = 'Thank you for submitting this maintenance task! Please review our [Maintenance Guidelines](.github/ISSUE_TEMPLATE/maintenance_report.md) for more details on our maintenance process.';
            }

            // Add welcome message if first issue
            if (isFirstIssue) {
              commentBody = `Welcome to the repository, @${author}! This is your first issue here. ${commentBody}`;
            }

            // Post comment if there's content
            if (commentBody) {
              await octokit.rest.issues.createComment({
                owner,
                repo,
                issue_number: issueNumber,
                body: commentBody
              });
            }

            // Set milestone for high/critical priority
            const priorityLabels = ['priority-high', 'priority-critical'];
            if (priorityLabels.some(label => issueLabels.includes(label.toLowerCase()))) {
              // Check if milestone v1.0.0 exists
              let milestone;
              try {
                const { data: milestones } = await octokit.rest.issues.listMilestones({
                  owner,
                  repo,
                  state: 'open'
                });
                milestone = milestones.find(m => m.title === 'v1.0.0');
              } catch (error) {
                throw error;
              }

              // Create milestone if not found
              if (!milestone) {
                const { data: newMilestone } = await octokit.rest.issues.createMilestone({
                  owner,
                  repo,
                  title: 'v1.0.0',
                  description: 'Version 1.0.0 milestone'
                });
                milestone = newMilestone;
              }

              // Set milestone
              await octokit.rest.issues.update({
                owner,
                repo,
                issue_number: issueNumber,
                milestone: milestone.number
              });
            }

            // Update status: remove needs-triage, add needs-review
            await octokit.rest.issues.removeLabel({
              owner,
              repo,
              issue_number: issueNumber,
              name: 'needs-triage'
            });

            await octokit.rest.issues.addLabels({
              owner,
              repo,
              issue_number: issueNumber,
              labels: ['needs-review']
            });